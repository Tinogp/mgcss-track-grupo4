name: Release Handout Alumnos

on:
  workflow_dispatch: {}
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release-handout:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build project JAR
        run: mvn -B clean package -DskipTests

      - id: release_jar
        name: Resolve release JAR
        run: |
          JAR_PATH=$(find target -maxdepth 1 -name "*.jar" ! -name "*.original" | head -n 1)
          if [ -z "$JAR_PATH" ]; then
            echo "No release JAR found in target/"
            exit 1
          fi
          echo "JAR_PATH=$JAR_PATH" >> "$GITHUB_OUTPUT"
          ls -lh "$JAR_PATH"

      - id: create_handout_zip
        name: Create handout zip
        run: |
          mkdir -p release
          TIMESTAMP=$(date +"%Y%m%d-%H%M%S")
          OUT=release/mgcss-handout-${GITHUB_RUN_ID}-$TIMESTAMP.zip
          if [ -d docs ]; then
            zip -r "$OUT" docs README.md || true
          else
            zip -r "$OUT" README.md || true
          fi
          echo "ZIP_PATH=$OUT" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v5
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/mgcss-track-grupo4:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/mgcss-track-grupo4:latest

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name || format('handout-%s', github.run_id) }}
          body: |
            Release generated by workflow.
            - JAR artifact: ${{ steps.release_jar.outputs.JAR_PATH }}
            - Handout ZIP: mgcss-handout-${{ github.run_id }}.zip
            - Docker image: ghcr.io/${{ github.repository_owner }}/mgcss-track-grupo4:${{ github.ref_name }} and latest
          files: |
            ${{ steps.release_jar.outputs.JAR_PATH }}
            ${{ steps.create_handout_zip.outputs.ZIP_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
