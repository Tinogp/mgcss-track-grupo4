services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: mgcss-track-grupo4:latest
    container_name: mgcss-track-grupo4
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: default
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
